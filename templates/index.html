<!DOCTYPE html>
<html>
<head>
    <title>Smart Delivery Prediction</title>

    <style>

        body{
            font-family:Arial;
            background:#e8f5e9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:10px;
            width:400px;
            box-shadow:0px 0px 15px gray;
        }

        h2{
            text-align:center;
            color:green;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            font-size:16px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="box">

<h2>SMART DELIVERY USING RETAIL STORES</h2>

<form action="/predict" method="POST">

<label>Pickup Location</label>
<input type="text" name="pickup" required>

<label>Retail Store</label>
<input type="text" name="store" required>

<label>Delivery Location</label>
<input type="text" name="delivery" required>

<label>Vehicle</label>

<select name="vehicle">

<option>Bike</option>
<option>Car</option>
<option>Van</option>

</select>

<label>Package Weight (Kg)</label>
<input type="number" step="0.1" name="weight" required>

<label>Distance (Km)</label>
<input type="number" step="0.1" name="distance" required>

<button type="submit">

Predict Delivery

</button>

</form>

</div>

</body>
</html>
