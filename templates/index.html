<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Delivery Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px auto; max-width: 500px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <h2>Delivery Time Estimator</h2>
    
    <!-- Action points directly to your Flask /predict route -->
    <form action="/predict" method="POST">
        <div class="form-group">
            <label for="pickup">Pickup Location:</label>
            <input type="text" id="pickup" name="pickup" required placeholder="e.g. Central Warehouse">
        </div>
        <div class="form-group">
            <label for="store">Store Name:</label>
            <input type="text" id="store" name="store" required placeholder="e.g. Outlet #12">
        </div>
        <div class="form-group">
            <label for="delivery">Delivery Address:</label>
            <input type="text" id="delivery" name="delivery" required placeholder="e.g. 123 Main St">
        </div>
        <div class="form-group">
            <label for="vehicle">Vehicle Type:</label>
            <select id="vehicle" name="vehicle" required>
                <option value="Bike">Bike</option>
                <option value="Car">Car</option>
                <option value="Van">Van</option>
            </select>
        </div>
        <div class="form-group">
            <label for="weight">Package Weight (kg):</label>
            <input type="number" id="weight" name="weight" step="0.1" min="0.1" required>
        </div>
        <div class="form-group">
            <label for="distance">Delivery Distance (km):</label>
            <input type="number" id="distance" name="distance" step="0.1" min="0.1" required>
        </div>
        <button type="submit">Predict Delivery Time</button>
    </form>
</body>
</html>
